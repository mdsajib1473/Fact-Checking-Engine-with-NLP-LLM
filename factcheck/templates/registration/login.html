{% extends "factcheck/base.html" %}

{% block title %}Log in — Fact-Checking Engine{% endblock %}

{% block content %}
  <section class="mx-auto max-w-sm">
    <h1 class="text-2xl font-semibold tracking-tight">Log in</h1>

    {% if form.errors %}
      <p class="mt-3 rounded-md bg-red-100 px-3 py-2 text-sm text-red-800 dark:bg-red-900/40 dark:text-red-200">
        Your username and password didn't match. Please try again.
      </p>
    {% endif %}

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}" class="block text-sm font-medium">
            {{ field.label }}
          </label>
          <input
            type="{% if field.name == 'password' %}password{% else %}text{% endif %}"
            name="{{ field.name }}"
            id="{{ field.id_for_label }}"
            class="mt-1 w-full rounded-lg border border-slate-300 bg-white p-2 text-sm shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200 dark:border-slate-700 dark:bg-slate-900 dark:focus:ring-slate-800"
            {% if field.field.required %}required{% endif %}
          />
        </div>
      {% endfor %}
      <button
        type="submit"
        class="w-full rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white"
      >
        Log in
      </button>
    </form>
  </section>
{% endblock %}
